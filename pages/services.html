<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Services | McLean Pool Services</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <header id="site-header">
    <nav>
      <a href="/" class="logo">
        <img src="/assets/images/logo.png" alt="McLean Pool Services" width="180" height="60">
      </a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/pages/services.html">Services</a></li>
        <li><a href="/pages/reviews.html">Reviews</a></li>
        <li><a href="/pages/contact.html">Contact</a></li>
      </ul>
      <a href="tel:832-492-8355" class="cta-button">Call Now</a>
    </nav>
  </header>

  <main style="max-width:900px; margin:2rem auto; padding:0 2rem;">
    <h1>Our Services</h1>
    <div id="services-container"></div>
    <div style="text-align:center; margin-top:3rem;">
      <h2>Ready for a Clean Pool?</h2>
      <p>Call us today for a free quote.</p>
      <a href="tel:832-492-8355" class="cta-button" style="margin-top:1rem;">832-492-8355</a>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 McLean Pool Services LLC. All rights reserved.</p>
  </footer>

  <script>
    fetch('/data/services.json')
      .then(res => res.json())
      .then(services => {
        const c = document.getElementById('services-container');
        c.innerHTML = services.map(s =>
          '<div class="review-card" style="margin-bottom:1.5rem;">' +
          '<h3>' + s.name + '</h3>' +
          '<p>' + s.description + '</p>' +
          '<span style="font-size:0.85rem; color:#6b7280; text-transform:uppercase;">' + s.category + '</span>' +
          '</div>'
        ).join('');
      });
  </script>
</body>
</html>
