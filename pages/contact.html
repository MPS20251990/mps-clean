<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | McLean Pool Services</title>

    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="icon" type="image/png" href="../assets/images/4222026LOGO.png">
<title>Contact Us | McLean Pool Services</title>
<meta name="description" content="Contact McLean Pool Services for quotes, service requests, or questions. Serving Pecan Grove, TX.">
<link rel="canonical" href="https://www.mcleanpoolservices.com/pages/contact.html">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="container header-content">
        <img src="../assets/images/4222026LOGO.png" class="logo" alt="McLean Pool Services Logo">

        <nav class="nav">
            <a href="../index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="reviews.html">Reviews</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>
</header>

<!-- PAGE HEADER -->
<section class="page-header">
    <div class="container">
        <h1>Contact Us</h1>
        <p>Get in touch for quotes, service requests, or questions.</p>
    </div>
</section>

<!-- CONTACT FORM SECTION -->
<section class="contact-section">
    <div class="container">

        <h2>Send Us a Message</h2>

        <form name="contact" method="POST" data-netlify="true">
            <input type="hidden" name="form-name" value="contact">

            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <input type="text" name="phone" placeholder="Your Phone Number" required>

            <textarea name="message" placeholder="How can we help you?" required></textarea>

            <button type="submit" class="btn-primary">Send Message</button>
        </form>

        <hr style="margin: 40px 0;">

        <!-- REVIEW FORM -->
        <h2 id="review-form">Leave a Review</h2>

        <form name="reviews" method="POST" data-netlify="true">
            <input type="hidden" name="form-name" value="reviews">

            <input type="text" name="name" placeholder="Your Name" required>
            <textarea name="message" placeholder="Your Review" required></textarea>

            <button type="submit" class="btn-primary">Submit Review</button>
        </form>

    </div>
</section>

</body>
</html>
