<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | McLean Pool Services</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <header id="site-header">
    <nav>
      <a href="/" class="logo">
        <img src="/assets/images/logo.png" alt="McLean Pool Services" width="180" height="60">
      </a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/pages/services.html">Services</a></li>
        <li><a href="/pages/reviews.html">Reviews</a></li>
        <li><a href="/pages/contact.html">Contact</a></li>
      </ul>
      <a href="tel:832-492-8355" class="cta-button">Call Now</a>
    </nav>
  </header>

  <main style="max-width:700px; margin:2rem auto; padding:0 2rem;">
    <h1>Contact Us</h1>

    <div style="margin-bottom:2rem;">
      <p><strong>Phone:</strong> <a href="tel:832-492-8355">832-492-8355</a></p>
      <p><strong>Email:</strong> <a href="mailto:Mcleanpoolservicesllc@gmail.com">Mcleanpoolservicesllc@gmail.com</a></p>
      <p><strong>Serving:</strong> Pecan Grove, Richmond, Rosenberg, Sugar Land &amp; Fort Bend County, TX</p>
    </div>

    <form name="contact" method="POST" data-netlify="true" data-netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="contact">
      <p style="display:none"><label>Don't fill this out: <input name="bot-field"></label></p>

      <label>Your Name *<br>
        <input type="text" name="name" required style="width:100%; padding:0.5rem; margin:0.25rem 0 1rem;">
      </label>

      <label>Email *<br>
        <input type="email" name="email" required style="width:100%; padding:0.5rem; margin:0.25rem 0 1rem;">
      </label>

      <label>Phone<br>
        <input type="tel" name="phone" style="width:100%; padding:0.5rem; margin:0.25rem 0 1rem;">
      </label>

      <label>How can we help? *<br>
        <textarea name="message" rows="5" required
          style="width:100%; padding:0.5rem; margin:0.25rem 0 1rem;"
          placeholder="Tell us about your pool and what you need..."></textarea>
      </label>

      <button type="submit" class="cta-button">Send Message</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2026 McLean Pool Services LLC. All rights reserved.</p>
  </footer>
</body>
</html>
