<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | McLean Pool Services</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="icon" type="image/png" href="../assets/images/4222026LOGO.png" />
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="container header-content">
            <img src="../assets/images/4222026LOGO.png" alt="McLean Pool Services Logo" class="logo" />
            <nav class="nav">
                <a href="../index.html">Home</a>
                <a href="services.html">Services</a>
                <a href="reviews.html">Reviews</a>
                <a href="contact.html" class="active">Contact</a>
            </nav>
        </div>
    </header>

    <!-- PAGE HERO -->
    <section class="page-hero">
        <div class="container">
            <h1>Contact Us</h1>
            <p>Fast response. Honest pricing. Owner‑operated.</p>
        </div>
    </section>

    <!-- CONTACT FORM -->
    <section class="contact-section">
        <div class="container">

            <h2>Request Service</h2>

            <form id="contact-form" class="contact-form">
                <label>Name</label>
                <input type="text" name="name" required />

                <label>Email</label>
                <input type="email" name="email" required />

                <label>Phone</label>
                <input type="text" name="phone" required />

                <label>Message</label>
                <textarea name="message" rows="5" required></textarea>

                <button type="submit" class="btn-primary">Send Message</button>

                <p id="form-status" class="form-status"></p>
            </form>

            <div class="contact-info">
                <h3>Prefer to Call?</h3>
                <p>Reach me directly for fastest service.</p>
                <a href="tel:832-449-6718" class="btn-secondary">Call Now</a>
            </div>

        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container footer-content">
            <p>© 2026 McLean Pool Services — Pecan Grove, TX</p>
            <p>Email: Mcleanpoolservicesllc@gmail.com</p>
            <a href="https://www.facebook.com/profile.php?id=61575176169589" target="_blank">Facebook</a>
        </div>
    </footer>

    <script src="../assets/js/main.js"></script>

</body>
</html>

</html>
